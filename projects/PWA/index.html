<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#15847f">
    <title>Pocket Planetarium</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="src/assets/icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="src/css/styles.css">
  </head>
  <body>
    <a class="skip-link" href="#lesson-title">Skip to lesson</a>
    <header class="app-shell">
      <nav class="topbar" aria-label="Primary">
        <a class="brand" href="index.html" aria-label="Pocket Planetarium home">
          <img src="src/assets/icons/icon.svg" alt="" width="44" height="44">
          <span>Pocket Planetarium</span>
        </a>
        <div class="topbar-actions">
          <a href="promo.html">Promo</a>
          <a href="docs.html">Docs</a>
          <button id="install-button" class="secondary-button" type="button" hidden>Install</button>
        </div>
      </nav>
    </header>

    <main class="app-layout">
      <aside class="topic-panel" aria-label="Lesson menu">
        <div class="panel-heading">
          <p class="eyebrow">Choose a stop</p>
          <h1>Solar system field guide</h1>
        </div>
        <div id="topic-menu" class="topic-menu" role="list"></div>
      </aside>

      <section class="lesson-stage" aria-live="polite">
        <div class="status-row">
          <p id="connection-status">Checking offline support...</p>
          <p id="progress-status">0 of 0 explored</p>
        </div>

        <article class="lesson">
          <div class="lesson-copy">
            <p id="lesson-kicker" class="eyebrow">Ready for launch</p>
            <h2 id="lesson-title">Loading lessons...</h2>
            <p id="lesson-description"></p>

            <div class="fact-strip">
              <div>
                <span>Distance from Sun</span>
                <strong id="lesson-distance">-</strong>
              </div>
              <div>
                <span>Orbit</span>
                <strong id="lesson-orbit">-</strong>
              </div>
              <div>
                <span>Type</span>
                <strong id="lesson-type">-</strong>
              </div>
            </div>

            <div class="lesson-actions">
              <button id="speak-button" type="button">Play audio</button>
              <button id="mark-button" class="secondary-button" type="button">Mark explored</button>
            </div>
          </div>

          <figure class="lesson-visual">
            <img id="lesson-image" src="src/assets/images/sun.svg" alt="">
            <figcaption id="lesson-caption">A stylized classroom illustration.</figcaption>
          </figure>
        </article>

        <section class="quiz-zone" aria-labelledby="quiz-title">
          <div>
            <p class="eyebrow">Quick check</p>
            <h2 id="quiz-title">Test your orbit sense</h2>
            <p id="quiz-question">Pick a lesson to start.</p>
          </div>
          <div id="quiz-answers" class="quiz-answers"></div>
          <p id="quiz-result" class="quiz-result" aria-live="polite"></p>
        </section>
      </section>
    </main>

    <script type="module" src="src/js/app.js"></script>
  </body>
</html>
